<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Lớp học</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold" th:text="${classroom.id == null ? 'Thêm Lớp Mới' : 'Sửa Lớp Học'}">Lớp học</h2>
            <a href="/classes" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Trở về
            </a>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="@{/classes/save}" th:object="${classroom}" method="post">
                            <input th:if="${classroom.id != null}" type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Lớp (Mã Lớp)</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="VD: CNTT K61" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Khoa quản lý</label>
                                <select class="form-select" th:field="*{department}">
                                    <option value="">-- Chọn Khoa --</option>
                                    <option th:each="dept : ${departments}"
                                            th:value="${dept.id}"
                                            th:text="${dept.name}"></option>
                                </select>
                            </div>
                            
                            <hr>
                            <div class="d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4">Lưu lại</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
