<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Trang chủ - Dashboard</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold">Dashboard</h2>
        </div>

        <!-- Cards -->
        <div class="row">
            <div class="col-xl-4 col-md-6 mb-4">
                <div class="card h-100 py-2" style="border-left: 4px solid #4e73df;">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col me-2">
                                <div class="text-xs fw-bold text-uppercase mb-1" style="color: #4e73df; font-size: 0.8rem;">Tổng Số Sinh Viên</div>
                                <div class="h5 mb-0 fw-bold text-gray-800" th:text="${totalStudents}">0</div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-mortarboard-fill text-muted" style="font-size: 2rem; opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-4 col-md-6 mb-4">
                <div class="card h-100 py-2" style="border-left: 4px solid #1cc88a;">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col me-2">
                                <div class="text-xs fw-bold text-uppercase mb-1" style="color: #1cc88a; font-size: 0.8rem;">Tổng Số Giảng Viên</div>
                                <div class="h5 mb-0 fw-bold text-gray-800" th:text="${totalInstructors}">0</div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-person-badge-fill text-muted" style="font-size: 2rem; opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-4 col-md-6 mb-4">
                <div class="card h-100 py-2" style="border-left: 4px solid #36b9cc;">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col me-2">
                                <div class="text-xs fw-bold text-uppercase mb-1" style="color: #36b9cc; font-size: 0.8rem;">Số Lượng Khoa</div>
                                <div class="h5 mb-0 mr-3 fw-bold text-gray-800" th:text="${totalDepartments}">0</div>
                            </div>
                            <div class="col-auto">
                                <i class="bi bi-building-fill text-muted" style="font-size: 2rem; opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <!-- Chart Area -->
            <div class="col-lg-7 col-xl-8">
                <div class="card mb-4 h-100">
                    <div class="card-header py-3 bg-white border-bottom border-light">
                        <h6 class="m-0 fw-bold" style="color: #4e73df;">Tỉ lệ sinh viên theo Khoa</h6>
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <div class="chart-area w-100" style="height: 300px; position: relative;">
                            <canvas id="deptChart"></canvas>
                        </div>
                        <div th:if="${#lists.isEmpty(chartData)}" class="text-muted small position-absolute">
                            Chưa có dữ liệu sinh viên/khoa.
                        </div>
                    </div>
                </div>
            </div>

            <!-- Grade Stats Chart -->
            <div class="col-lg-5 col-xl-4">
                <div class="card mb-4 h-100">
                    <div class="card-header py-3 bg-white border-bottom border-light">
                        <h6 class="m-0 fw-bold" style="color: #1cc88a;">Thống kê học lực (Tỉ lệ điểm)</h6>
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <div class="chart-area w-100" style="height: 300px; position: relative;">
                            <canvas id="gradeChart"></canvas>
                        </div>
                        <div th:if="${gradeStats[0] == 0 && gradeStats[1] == 0 && gradeStats[2] == 0 && gradeStats[3] == 0}" class="text-muted small position-absolute">
                            Chưa có thống kê điểm số.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            document.addEventListener('DOMContentLoaded', function() {
                var chartData = /*[[${chartData}]]*/ [];
                
                if (chartData && chartData.length > 0) {
                    var labels = chartData.map(function(item) { return item[0]; });
                    var data = chartData.map(function(item) { return item[1]; });
                    
                    var ctx = document.getElementById("deptChart");
                    if (ctx) {
                        new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels,
                                datasets: [{
                                    data: data,
                                    backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b'],
                                    hoverBackgroundColor: ['#2e59d9', '#17a673', '#2c9faf', '#dda20a', '#be2617'],
                                    hoverBorderColor: "rgba(234, 236, 244, 1)",
                                }],
                            },
                            options: {
                                maintainAspectRatio: false,
                                cutout: '70%',
                                plugins: {
                                    legend: {
                                        position: 'bottom',
                                        labels: {
                                            usePointStyle: true,
                                            padding: 20
                                        }
                                    }
                                }
                            },
                        });
                    }
                }

                var gradeStats = /*[[${gradeStats}]]*/ [0,0,0,0];
                var hasGrades = gradeStats.some(function(item) { return item > 0; });
                
                if (hasGrades) {
                    var ctx2 = document.getElementById("gradeChart");
                    if (ctx2) {
                        new Chart(ctx2, {
                            type: 'doughnut',
                            data: {
                                labels: ['Giỏi (>=8.0)', 'Khá (>=6.5)', 'Trung bình (>=5.0)', 'Yếu (<5.0)'],
                                datasets: [{
                                    data: gradeStats,
                                    backgroundColor: ['#1cc88a', '#4e73df', '#f6c23e', '#e74a3b'],
                                    hoverBackgroundColor: ['#17a673', '#2e59d9', '#dda20a', '#be2617'],
                                    hoverBorderColor: "rgba(234, 236, 244, 1)",
                                }],
                            },
                            options: {
                                maintainAspectRatio: false,
                                cutout: '70%',
                                plugins: {
                                    legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                                }
                            },
                        });
                    }
                }

            });
            /*]]>*/
        </script>
    </div>
</body>
</html>
