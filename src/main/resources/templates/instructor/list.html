<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Danh sách Giảng Viên</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold">Danh sách Giảng Viên</h2>
            <a href="/instructors/new" class="btn btn-primary shadow-sm">
                <i class="bi bi-person-plus-fill me-1"></i> Thêm giảng viên
            </a>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="text-center" width="5%">ID</th>
                                <th>Họ và Tên Giảng Viên</th>
                                <th>Email</th>
                                <th class="text-center" width="15%">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="inst : ${instructors}">
                                <td class="text-center fw-bold text-muted" th:text="${inst.id}">1</td>
                                <td class="fw-bold text-dark" th:text="${inst.fullName}">Name</td>
                                <td th:text="${inst.email}">Khoa</td>
                                <td class="text-center">
                                    <a th:href="@{/instructors/edit/{id}(id=${inst.id})}" class="btn btn-sm btn-outline-warning rounded-circle me-1" title="Sửa">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <a th:href="@{/instructors/delete/{id}(id=${inst.id})}" class="btn btn-sm btn-outline-danger rounded-circle" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa giảng viên này?');">
                                        <i class="bi bi-trash-fill"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${instructors.empty}">
                                <td colspan="4" class="text-center py-4 text-muted">Không có dữ liệu giảng viên</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
