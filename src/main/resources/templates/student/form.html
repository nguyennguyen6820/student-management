<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="${student.id == null ? 'Thêm sinh viên' : 'Sửa sinh viên'}"></title>
</head>

<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold"
                th:text="${student.id == null ? 'Thêm sinh viên mới' : 'Cập nhật sinh viên'}">Form</h2>
            <a href="/students" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Trở về
            </a>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body p-5">
                        <form th:action="@{/students/save}" th:object="${student}" method="post">
                            <input th:if="${student.id != null}" type="hidden" th:field="*{id}" />

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-bold">Họ và Tên</label>
                                    <input type="text" class="form-control bg-light" th:field="*{fullName}"
                                        placeholder="Nhập họ và tên đầy đủ" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" class="form-control bg-light" th:field="*{email}"
                                        placeholder="example@email.com" required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-bold">Ngày sinh</label>
                                    <input type="date" class="form-control bg-light" th:field="*{dob}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Giới tính</label>
                                    <div class="mt-2">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" th:field="*{gender}"
                                                value="true" id="genderMale" required>
                                            <label class="form-check-label" for="genderMale">Nam</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" th:field="*{gender}"
                                                value="false" id="genderFemale">
                                            <label class="form-check-label" for="genderFemale">Nữ</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <label class="form-label fw-bold">Lớp học</label>
                                <select class="form-select bg-light" th:field="*{classroom}">
                                    <option value="">-- Chọn lớp học --</option>
                                    <option th:each="cls : ${classrooms}" th:value="${cls.id}" th:text="${cls.name}">
                                    </option>
                                </select>
                            </div>

                            <hr>

                            <div class="d-flex justify-content-end mt-4">
                                <a href="/students" class="btn btn-light border me-2">Hủy bỏ</a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-save me-1"></i> Lưu lại
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
