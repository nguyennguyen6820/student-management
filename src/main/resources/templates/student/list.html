<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Danh sách sinh viên</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold">Danh sách Sinh Viên</h2>
            <div>
                <a href="/students/export" class="btn btn-success shadow-sm me-2">
                    <i class="bi bi-file-earmark-excel-fill me-1"></i> Xuất Excel
                </a>
                <a href="/students/new" class="btn btn-primary shadow-sm">
                    <i class="bi bi-person-plus-fill me-1"></i> Thêm sinh viên mới
                </a>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold" style="color: #4e73df;">Dữ liệu sinh viên</h6>
                <form th:action="@{/students}" method="get"
                    class="d-none d-sm-inline-block form-inline ms-md-3 my-2 my-md-0 mw-100 border-0">
                    <div class="input-group">
                        <input type="text" name="keyword" th:value="${keyword}"
                            class="form-control bg-light border-0 small" placeholder="Tìm tên, email..."
                            aria-label="Search">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="text-center" width="5%">ID</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Ngày sinh</th>
                                <th>Giới tính</th>
                                <th>Lớp</th>
                                <th class="text-center" width="15%">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="st : ${studentPage.content}">
                                <td class="text-center text-muted fw-bold" th:text="${st.id}">1</td>
                                <td th:text="${st.fullName}">Name</td>
                                <td th:text="${st.email}">Email</td>
                                <td th:text="${#temporals.format(st.dob, 'dd/MM/yyyy')}">Date</td>
                                <td>
                                    <span th:if="${st.gender == true}" class="badge bg-info text-white"><i
                                            class="bi bi-gender-male"></i> Nam</span>
                                    <span th:if="${st.gender == false}" class="badge bg-danger text-white"><i
                                            class="bi bi-gender-female"></i> Nữ</span>
                                    <span th:if="${st.gender == null}" class="text-muted">N/A</span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary"
                                        th:text="${st.classroom != null ? st.classroom.name : 'Chưa xếp lớp'}">Class</span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/enrollments/register/{id}(id=${st.id})}"
                                        class="btn btn-sm btn-outline-success rounded-circle me-1" title="Đăng ký môn">
                                        <i class="bi bi-journal-plus"></i>
                                    </a>
                                    <a th:href="@{/grades/student/{id}(id=${st.id})}"
                                        class="btn btn-sm btn-outline-info rounded-circle me-1" title="Bảng điểm">
                                        <i class="bi bi-card-checklist"></i>
                                    </a>
                                    <a th:href="@{/students/edit/{id}(id=${st.id})}"
                                        class="btn btn-sm btn-outline-warning rounded-circle me-1" title="Sửa">
                                        <i class="bi bi-pencil-fill"></i>
                                    </a>
                                    <a th:href="@{/students/delete/{id}(id=${st.id})}"
                                        class="btn btn-sm btn-outline-danger rounded-circle" title="Xóa"
                                        onclick="return confirm('Bạn có chắc chắn muốn xóa sinh viên này?');">
                                        <i class="bi bi-trash-fill"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${studentPage.content.empty}">
                                <td colspan="7" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox fs-2 mb-2 d-block"></i> Không tìm thấy sinh viên nào
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer bg-white border-top-0 pt-3 pb-3" th:if="${studentPage.totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${studentPage.first ? 'disabled' : ''}">
                            <a class="page-link"
                                th:href="@{/students(page=${studentPage.number}, keyword=${keyword})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, studentPage.totalPages)}"
                            th:classappend="${studentPage.number + 1 == i ? 'active' : ''}">
                            <a class="page-link" th:href="@{/students(page=${i}, keyword=${keyword})}"
                                th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${studentPage.last ? 'disabled' : ''}">
                            <a class="page-link"
                                th:href="@{/students(page=${studentPage.number + 2}, keyword=${keyword})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>

</html>
