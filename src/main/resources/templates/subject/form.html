<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Môn học</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h3 text-gray-800 mb-0 fw-bold" th:text="${subject.id == null ? 'Thêm Môn Học' : 'Sửa Thông Tin Môn Học'}">Môn học</h2>
            <a href="/subjects" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Trở về
            </a>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <form th:action="@{/subjects/save}" th:object="${subject}" method="post">
                            <input th:if="${subject.id != null}" type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên Môn Học</label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="VD: Toán Cao Cấp" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Số Tín Chỉ</label>
                                <input type="number" min="1" max="10" class="form-control" th:field="*{credits}" placeholder="VD: 3" required>
                            </div>
                            
                            <hr>
                            <div class="d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4">Lưu lại</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
